services:

  redis:
    image: redis:7.2
    container_name: redis-server
    restart: always

    ports:
      - "6379:6379"

  backend:
    build: .

    container_name: task-manager-api

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis-server:6379
      DB_HOST: host.docker.internal

    depends_on:
      - redis

  worker:
    build: .

    container_name: task-worker

    command: node src/workers/emailWorker.js

    restart: always

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis-server:6379
      DB_HOST: host.docker.internal

    depends_on:
      - redis